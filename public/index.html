<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>POD Pulse</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="top-nav">
        <a href="/admin.html">Admin</a>
      </section>
      <section class="hero">
        <h1 id="appTitle">POD Pulse</h1>
        <p id="subtitle">Capture signed proof of delivery, store it offline, and sync it when the connection returns.</p>
        <span id="badgeText" class="badge">Offline-safe | Driver-linked | OneDrive-ready</span>
      </section>

      <section class="card">
        <div class="grid two-col">
          <div>
            <div class="field">
              <label id="driverLabel">Driver (locked to this device)</label>
              <div id="driverBadge" class="chip">Not linked yet</div>
            </div>
            <div id="setupDriver" class="field" style="margin-top:12px;">
              <label id="driverBindLabel" for="driverPicker">Select driver once</label>
              <select id="driverPicker"></select>
              <button id="bindDriverBtn" style="margin-top:8px;">Lock driver to this device</button>
            </div>
            <div class="field" style="margin-top:12px;">
              <label id="invoiceLabel" for="invoiceNumber">Invoice number</label>
              <input id="invoiceNumber" placeholder="INV-1042" />
            </div>
            <div class="field" style="margin-top:12px;">
              <label id="paymentLabel" for="paymentMethod">Payment method</label>
              <select id="paymentMethod"></select>
            </div>
            <div class="chip-row">
              <span class="chip" id="queueCount">0 pending</span>
              <span class="chip" id="connectionState">Online</span>
            </div>
          </div>
          <div>
            <video id="cameraPreview" class="preview" autoplay playsinline muted></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="grid" style="margin-top:12px;">
              <button id="captureBtn">Capture invoice</button>
              <button id="switchBtn" class="secondary">Switch camera</button>
            </div>
            <img id="capturedImage" class="preview hidden" alt="Captured invoice" />
            <p class="status" id="status">Ready to capture a signed invoice.</p>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="grid">
          <button id="submitBtn">Save to offline queue</button>
          <button id="syncBtn" class="secondary">Sync now</button>
        </div>
      </section>
    </main>

    <script src="/js/app.js"></script>
  </body>
</html>
