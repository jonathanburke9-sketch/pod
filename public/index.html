<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>POD Hub</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/scanhive-icon.svg" />
    <link rel="stylesheet" href="/css/styles.css?v=20260724a" />
  </head>
  <body>
    <main class="app">
      <section id="adminNav" class="top-nav hidden">
        <a href="/admin.html">Admin</a>
      </section>

      <section class="hero home-hero">
        <img class="logo-mark" src="/icons/scanhive-icon.svg" alt="ScanHive logo" />
        <h1 id="homeTitle">POD Hub</h1>
        <p id="homeSubtitle">Choose one function to start scanning and upload to the right OneDrive destination.</p>
        <span id="homeBadge" class="badge">Device-locked | Function-based | OneDrive-ready</span>
      </section>

      <section class="card">
        <div class="grid two-col">
          <div>
            <div class="field">
              <label id="staffLabel">Staff member (locked to this device)</label>
              <div id="staffBadge" class="chip">Not linked yet</div>
            </div>
            <div id="setupStaff" class="field" style="margin-top:12px;">
              <label id="staffBindLabel" for="staffPicker">Select staff once</label>
              <select id="staffPicker"></select>
              <button id="bindStaffBtn" style="margin-top:8px;">Lock staff to this device</button>
            </div>
            <p id="staffStatus" class="status">Lock a staff member, then choose a function.</p>
          </div>
          <div class="function-grid" id="functionGrid" aria-live="polite">
            <button class="function-card fn-pod-sb" data-function-code="pod-sb" type="button">
              <strong>POD-SB</strong>
              <span>Current flow</span>
            </button>
            <button class="function-card fn-pod-just" data-function-code="pod-just" type="button">
              <strong>POD-Just</strong>
              <span>Alt POD fields</span>
            </button>
            <button class="function-card fn-receipt-sb" data-function-code="receipt-sb" type="button">
              <strong>Receipt-SB</strong>
              <span>Receipt capture</span>
            </button>
            <button class="function-card fn-receipt-just" data-function-code="receipt-just" type="button">
              <strong>Receipt-Just</strong>
              <span>Receipt alt fields</span>
            </button>
          </div>
        </div>
      </section>

      <section class="card">
        <p class="hint">Unavailable functions are disabled per staff permissions in Admin.</p>
      </section>
    </main>

    <script src="/js/home.js?v=20260724a"></script>
  </body>
</html>
