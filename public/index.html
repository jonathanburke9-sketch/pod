<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>POD Pulse</title>
    <link rel="manifest" href="/manifest.json" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #060816;
        --panel: rgba(15, 23, 42, 0.92);
        --accent: #4f46e5;
        --accent-2: #22d3ee;
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: rgba(148, 163, 184, 0.2);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #172554 0%, var(--bg) 45%, #020617 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .app { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
      .hero, .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
      }
      .hero { padding: 24px; margin-bottom: 16px; }
      .hero h1 { margin: 0 0 6px; font-size: 1.6rem; }
      .hero p { margin: 0; color: var(--muted); line-height: 1.5; }
      .hero .badge { display:inline-block; margin-top:12px; padding:8px 12px; border-radius:999px; font-size:0.8rem; background: linear-gradient(90deg, var(--accent), var(--accent-2)); color:white; }
      .card { padding: 18px; margin-bottom: 16px; }
      .grid { display:grid; gap: 14px; }
      .field { display:flex; flex-direction:column; gap:6px; }
      input, select, button { border-radius: 14px; border: 1px solid var(--border); padding: 12px 14px; font-size: 1rem; }
      input, select { background:#0f172a; color: var(--text); }
      button { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color:white; border:none; cursor:pointer; font-weight:700; }
      button.secondary { background: #111827; border:1px solid var(--border); }
      .preview { width:100%; border-radius: 18px; border:1px solid var(--border); min-height: 220px; object-fit: cover; background:#0f172a; }
      .status { margin-top: 10px; color: var(--muted); font-size: 0.95rem; }
      .chip-row { display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
      .chip { padding:8px 10px; border-radius:999px; background:#111827; color:#cbd5e1; font-size:0.8rem; }
      .hidden { display:none; }
      @media (min-width: 700px) { .grid { grid-template-columns: 1.1fr 0.9fr; } }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>POD Pulse</h1>
        <p>Capture signed proof of delivery, store it offline, and sync it when the connection returns.</p>
        <span class="badge">Offline-safe · Driver-linked · OneDrive-ready</span>
      </section>

      <section class="card">
        <div class="grid">
          <div>
            <div class="field">
              <label for="driver">Driver</label>
              <select id="driver"></select>
            </div>
            <div class="field" style="margin-top:12px;">
              <label for="invoiceNumber">Invoice number</label>
              <input id="invoiceNumber" placeholder="INV-1042" />
            </div>
            <div class="field" style="margin-top:12px;">
              <label for="paymentMethod">Payment method</label>
              <select id="paymentMethod">
                <option>Cash</option>
                <option>Card</option>
                <option>Bank Transfer</option>
              </select>
            </div>
            <div class="chip-row">
              <span class="chip" id="queueCount">0 pending</span>
              <span class="chip" id="connectionState">Online</span>
            </div>
          </div>
          <div>
            <video id="cameraPreview" class="preview" autoplay playsinline muted></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="grid" style="margin-top:12px;">
              <button id="captureBtn">Capture invoice</button>
              <button id="switchBtn" class="secondary">Switch camera</button>
            </div>
            <img id="capturedImage" class="preview hidden" alt="Captured invoice" />
            <p class="status" id="status">Ready to capture a signed invoice.</p>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="grid">
          <button id="submitBtn">Save to offline queue</button>
          <button id="adminBtn" class="secondary">Manage drivers</button>
        </div>
      </section>

      <section class="card hidden" id="adminPanel">
        <h3 style="margin-top:0;">Driver backend</h3>
        <div class="field">
          <label for="driverName">Add driver</label>
          <input id="driverName" placeholder="Driver name" />
        </div>
        <div class="grid" style="margin-top:12px;">
          <button id="addDriverBtn">Add driver</button>
          <button id="removeDriverBtn" class="secondary">Remove selected driver</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
