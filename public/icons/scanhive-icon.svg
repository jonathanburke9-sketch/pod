<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ScanHive Icon</title>
  <desc id="desc">Dark rounded app icon with yellow hive emblem, scanner motif and flying bee accent</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262626" />
      <stop offset="1" stop-color="#0f0f0f" />
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd042" />
      <stop offset="1" stop-color="#f7a800" />
    </linearGradient>
    <linearGradient id="amberDark" x1="0" y1="0" x2="1" y2="1">
